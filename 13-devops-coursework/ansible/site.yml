---
# =============================================================================
# MAIN PLAYBOOK - DevOps Coursework
# =============================================================================

# 1. Base configuration for ALL hosts
- name: Base configuration for all hosts
  hosts: all
  become: true
  roles:
    - base
    - security
    - node_exporter
    - filebeat


# 2. Web Servers
- name: Configure Web Servers
  hosts: webservers
  become: true
  roles:
    - nginx_exporter
    - nginx

# 3. Prometheus
- name: Configure Prometheus
  hosts: prometheus
  become: true
  roles:
    - prometheus
    - filebeat

# 4. Grafana
- name: Configure Grafana
  hosts: grafana
  become: true
  roles:
    - grafana

# 5. Elasticsearch
- name: Configure Elasticsearch
  hosts: elasticsearch
  become: true
  roles:
    - elasticsearch

# 6. Kibana
- name: Configure Kibana
  hosts: kibana
  become: true
  roles:
    - kibana

# 7. Kibana Setup (Data Views)
- name: Configure Kibana (Data Views)
  hosts: kibana
  become: true
  roles:
    - kibana_setup