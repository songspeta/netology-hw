---
- name: Create Prometheus group
  group:
    name: "{{ prometheus_group }}"
    state: present
    system: yes
  tags: [prometheus]

- name: Create Prometheus user
  user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
  tags: [prometheus]

- name: Create Prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"
  tags: [prometheus]

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    mode: '0644'
  register: prometheus_download
  tags: [prometheus]

- name: Extract Prometheus
  unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    dest: "{{ prometheus_install_dir }}"
    remote_src: yes
    extra_opts: [--strip-components=1]
    creates: "{{ prometheus_install_dir }}/prometheus"
  tags: [prometheus]

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0644'
  notify: Restart Prometheus
  tags: [prometheus]

- name: Create Prometheus systemd service
  copy:
    content: |
      [Unit]
      Description=Prometheus Monitoring System
      Documentation=https://prometheus.io/docs/introduction/overview/
      After=network-online.target

      [Service]
      User={{ prometheus_user }}
      Group={{ prometheus_group }}
      Type=simple
      ExecStart={{ prometheus_install_dir }}/prometheus \
        --config.file={{ prometheus_config_dir }}/prometheus.yml \
        --storage.tsdb.path={{ prometheus_data_dir }} \
        --storage.tsdb.retention.time={{ prometheus_retention_time }} \
        --web.listen-address={{ prometheus_listen_address }}:{{ prometheus_port }} \
        --web.enable-lifecycle
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  tags: [prometheus]

- name: Enable and start Prometheus
  systemd:
    name: prometheus
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [prometheus]


- name: Create Prometheus log directory
  file:
    path: "{{ prometheus_log_dir }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'
  tags: [prometheus, config]


- name: Create Prometheus log file
  file:
    path: "{{ prometheus_log_dir }}/prometheus.log"
    state: touch
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0644'
  tags: [prometheus, config]


- name: Create Prometheus systemd service
  copy:
    content: |
      [Unit]
      Description=Prometheus Monitoring System
      After=network-online.target

      [Service]
      User={{ prometheus_user }}
      Group={{ prometheus_group }}
      Type=simple
      ExecStart={{ prometheus_install_dir }}/prometheus \
        --config.file={{ prometheus_config_dir }}/prometheus.yml \
        --storage.tsdb.path={{ prometheus_data_dir }} \
        --storage.tsdb.retention.time={{ prometheus_retention_time }} \
        --web.listen-address={{ prometheus_listen_address }}:{{ prometheus_port }} \
        --web.enable-lifecycle
      Restart=always

      StandardOutput=append:{{ prometheus_log_dir }}/prometheus.log
      StandardError=append:{{ prometheus_log_dir }}/prometheus.log

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  notify: Restart Prometheus
  tags: [prometheus, service]
