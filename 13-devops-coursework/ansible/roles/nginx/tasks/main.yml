---
# =============================================================================
# ROLE: NGINX
# Описание: Установка и настройка веб-сервера Nginx + PHP + API
# Применимо к: webservers
# =============================================================================

- name: Install Nginx and PHP-FPM
  apt:
    name:
      - nginx
      - php-fpm
      - php-cli
      - php-json
      - php-curl
    state: present
    update_cache: yes
  tags: [nginx, packages]

- name: Create log file for submissions
  file:
    path: "{{ submission_log | default('/var/log/submissions.log') }}"
    state: touch
    mode: '0644'
    owner: www-data
    group: www-data
  tags: [nginx, config]

- name: Deploy index.html from Jinja2 template
  template:
    src: index.html.j2
    dest: "{{ nginx_web_root | default('/var/www/html') }}/index.html"
    mode: '0644'
    owner: www-data
    group: www-data
  notify: Reload Nginx
  tags: [nginx, config]

- name: Create API directory
  file:
    path: "{{ nginx_web_root | default('/var/www/html') }}/api"
    state: directory
    mode: '0755'
    owner: www-data
    group: www-data
  tags: [nginx, config]


- name: Deploy submit.php API endpoint
  copy:
    src: submit.php
    dest: "{{ nginx_web_root | default('/var/www/html') }}/api/submit.php"
    mode: '0644'
    owner: www-data
    group: www-data
  notify: Reload Nginx
  tags: [nginx, api]

- name: Deploy whoami.php API endpoint
  copy:
    src: whoami.php
    dest: "{{ nginx_web_root | default('/var/www/html') }}/api/whoami.php"
    mode: '0644'
    owner: www-data
    group: www-data
  notify: Reload Nginx
  tags: [nginx, api]


- name: Configure Nginx with PHP and CORS
  template:
    src: nginx-default.conf.j2
    dest: /etc/nginx/sites-available/default
    mode: '0644'
    backup: yes
  notify: Reload Nginx
  tags: [nginx, config]

- name: Enable Nginx stub_status for metrics
  copy:
    content: |
      server {
          listen 127.0.0.1:8080;
          server_name localhost;
          location /stub_status {
              stub_status;
              allow 127.0.0.1;
              allow 10.0.0.0/8;
              deny all;
          }
      }
    dest: /etc/nginx/conf.d/metrics.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload Nginx
  tags: [nginx, config]

- name: Ensure Nginx is running and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes
  tags: [nginx, service]

- name: Ensure PHP-FPM is running and enabled
  systemd:
    name: php8.3-fpm
    state: started
    enabled: yes
  tags: [nginx, service]

- name: Test Nginx configuration
  command: nginx -t
  register: nginx_test
  changed_when: false
  failed_when: nginx_test.rc != 0
  tags: [nginx, config]