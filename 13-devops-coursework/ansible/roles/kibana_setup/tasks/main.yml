---
# =============================================================================
# KIBANA SETUP - MAIN TASKS
# =============================================================================

# -----------------------------------------------------------------------------
# Wait for Kibana to be ready
# -----------------------------------------------------------------------------
- name: Wait for Kibana TCP port
  wait_for:
    host: "{{ kibana_host }}"
    port: "{{ kibana_port }}"
    timeout: 300
    delay: 10
  tags: [kibana_setup, wait]

- name: Check Kibana API status
  uri:
    url: "{{ kibana_url }}/api/status"
    method: GET
    status_code: 200
  register: kibana_status
  until: kibana_status.status == 200
  retries: 30
  delay: 10
  tags: [kibana_setup, check]

# -----------------------------------------------------------------------------
# Create Data Views
# -----------------------------------------------------------------------------
- name: Create Data Views
  uri:
    url: "{{ kibana_url }}/api/data_views/data_view"
    method: POST
    headers:
      Content-Type: "application/json"
      kbn-xsrf: "true"
    body_format: json
    body:
      data_view:
        id: "{{ item.id }}"
        name: "{{ item.name }}"
        title: "{{ item.title }}"
        timeFieldName: "{{ item.time_field }}"
    status_code: [200, 201, 409]
  loop: "{{ kibana_data_views }}"
  loop_control:
    label: "{{ item.name }}"
  register: data_view_result
  failed_when: data_view_result.status not in [200, 201, 409]
  tags: [kibana_setup, dataviews]

- name: Show Data Views creation summary
  debug:
    msg: "Data Views: {{ data_view_result.results | selectattr('status', 'in', [200, 201]) | list | length }} created, {{ data_view_result.results | selectattr('status', 'equalto', 409) | list | length }} already exist"
  tags: [kibana_setup, dataviews]
