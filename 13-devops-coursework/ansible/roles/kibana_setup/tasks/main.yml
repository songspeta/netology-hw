---
# =============================================================================
# Kibana Setup Tasks
# =============================================================================

- name: Wait for Kibana API to be ready
  uri:
    url: "{{ kibana_api_url }}/api/status"
    method: GET
    return_content: yes
    status_code: 200
  register: kibana_status
  retries: "{{ kibana_api_retries | default(15) }}"
  delay: "{{ kibana_api_delay | default(10) }}"
  until: kibana_status.status == 200
  tags: [kibana_setup, wait]

# =============================================================================
# Data Views
# =============================================================================

- name: Create Data Views
  uri:
    url: "{{ kibana_api_url }}/api/data_views/data_view"
    method: POST
    body_format: json
    body:
      data_view:
        id: "{{ item.id }}"
        name: "{{ item.title }}"
        title: "{{ item.title }}"
        timeFieldName: "{{ item.time_field }}"
    headers:
      Content-Type: "application/json"
      kbn-xsrf: "true"
    status_code: [200, 201, 400, 409]
  loop: "{{ kibana_data_views }}"
  register: data_view_result
  tags: [kibana_setup, dataviews]

- name: Display Data View creation results
  debug:
    msg: "Data View '{{ item.item.title }}':
          {% if item.status in [200, 201] %}✅ Created
          {% elif item.status == 409 %}ℹ️  Already exists (409)
          {% elif item.status == 400 and 'Duplicate' in (item.json.message | default('')) %}ℹ️  Already exists (400)
          {% else %}⚠️  {{ item.json.message | default('Status: ' + item.status | string) }}{% endif %}"
  loop: "{{ data_view_result.results }}"
  tags: [kibana_setup, dataviews]

- name: Set default Data View
  uri:
    url: "{{ kibana_api_url }}/api/kibana/settings"
    method: POST
    body_format: json
    body:
      changes:
        defaultIndex: "{{ kibana_default_data_view }}"
    headers:
      Content-Type: "application/json"
      kbn-xsrf: "true"
    status_code: [200, 400]
  tags: [kibana_setup, dataviews]

# =============================================================================
# Saved Searches (Pre-filtered views)
# =============================================================================

- name: Create Nginx Access Log saved search
  uri:
    url: "{{ kibana_api_url }}/api/saved_objects/search/nginx-access-logs"
    method: POST
    body_format: json
    body:
      attributes:
        title: "Nginx Access Logs"
        description: "Pre-filtered view for nginx access.log"
        hits: 0
        columns:
          - "@timestamp"
          - "message"
          - "source.ip"
          - "url.path"
          - "http.response.status_code"
        sort:
          - - "@timestamp"
            - desc
        version: 1
        kibanaSavedObjectMeta:
          searchSourceJSON: |
            {
              "indexRefName": "kibanaSavedObjectMeta.searchSourceJSON.index",
              "query": {
                "query": "service: \"nginx-access\"",
                "language": "kuery"
              },
              "filter": []
            }
      references:
        - name: "kibanaSavedObjectMeta.searchSourceJSON.index"
          type: "index-pattern"
          id: "applogs-*"
    headers:
      Content-Type: "application/json"
      kbn-xsrf: "true"
    status_code: [200, 201, 400, 409]
  register: saved_search_access_result
  tags: [kibana_setup, saved_searches]

