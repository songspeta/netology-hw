# =============================================================================
# Visualizations
# =============================================================================

- name: Create Nginx Requests per Minute visualization
  uri:
    url: "{{ kibana_api_url }}/api/saved_objects/visualization/nginx-requests-per-minute"
    method: POST
    body_format: json
    body:
      attributes:
        title: "Nginx Requests per Minute"
        description: "Total nginx requests over time"
        visState: |
          {
            "title": "Nginx Requests per Minute",
            "type": "line",
            "aggs": [
              {
                "id": "1",
                "enabled": true,
                "type": "count",
                "params": {},
                "schema": "metric"
              },
              {
                "id": "2",
                "enabled": true,
                "type": "date_histogram",
                "params": {
                  "interval": "1m",
                  "customInterval": "1m",
                  "min_doc_count": 0,
                  "extended_bounds": {}
                },
                "schema": "segment"
              }
            ],
            "params": {
              "addTooltip": true,
              "addLegend": true,
              "legendPosition": "right",
              "times": [],
              "addTimeMarker": false
            }
          }
        uiStateJSON: "{}"
        version: 1
        kibanaSavedObjectMeta:
          searchSourceJSON: |
            {
              "indexRefName": "kibanaSavedObjectMeta.searchSourceJSON.index",
              "query": {
                "query": "service: \"nginx-access\"",
                "language": "kuery"
              },
              "filter": []
            }
      references:
        - name: "kibanaSavedObjectMeta.searchSourceJSON.index"
          type: "index-pattern"
          id: "applogs-*"
    headers:
      Content-Type: "application/json"
      kbn-xsrf: "true"
    status_code: [200, 201, 400, 409]
  register: vis_nginx_requests_result
  tags: [kibana_setup, visualizations]


# =============================================================================
# Dashboards
# =============================================================================

- name: Create Nginx Overview Dashboard
  uri:
    url: "{{ kibana_api_url }}/api/saved_objects/dashboard/nginx-overview"
    method: POST
    body_format: json
    body:
      attributes:
        title: "Nginx Overview Dashboard"
        description: "Overview of nginx access and error logs"
        hits: 0
        panelsJSON: |
          [
            {
              "gridData": {
                "w": 24,
                "h": 15,
                "x": 0,
                "y": 0,
                "i": "1"
              },
              "version": "9.3.2",
              "panelIndex": "1",
              "panelRefName": "panel_1",
              "embeddableConfig": {}
            },
            {
              "gridData": {
                "w": 12,
                "h": 15,
                "x": 0,
                "y": 15,
                "i": "2"
              },
              "version": "9.3.2",
              "panelIndex": "2",
              "panelRefName": "panel_2",
              "embeddableConfig": {}
            },
            {
              "gridData": {
                "w": 12,
                "h": 15,
                "x": 12,
                "y": 15,
                "i": "3"
              },
              "version": "9.3.2",
              "panelIndex": "3",
              "panelRefName": "panel_3",
              "embeddableConfig": {}
            }
          ]
        timeRestore: false
        version: 1
        kibanaSavedObjectMeta:
          searchSourceJSON: |
            {
              "query": {
                "query": "",
                "language": "kuery"
              },
              "filter": []
            }
      references:
        - name: "panel_1"
          type: "visualization"
          id: "nginx-requests-per-minute"
        - name: "panel_2"
          type: "search"
          id: "nginx-access-logs"
        - name: "panel_3"
          type: "search"
          id: "nginx-error-logs"
    headers:
      Content-Type: "application/json"
      kbn-xsrf: "true"
    status_code: [200, 201, 400, 409]
  register: dashboard_nginx_result
  tags: [kibana_setup, dashboards]

