---
# =============================================================================
# ROLE: ELASTICSEARCH
# Описание: Установка Elasticsearch 9.3.2 из локального .deb пакета
# Применимо к: elasticsearch
# =============================================================================

- name: Install Java 17 (required for Elasticsearch)
  apt:
    name:
      - openjdk-17-jdk
      - openjdk-17-jre
    state: present
    update_cache: yes
  tags: [elasticsearch, packages]

- name: Copy Elasticsearch .deb package to remote host
  copy:
    src: elasticsearch-9.3.2-amd64.deb
    dest: /tmp/elasticsearch-9.3.2-amd64.deb
    mode: '0644'
  tags: [elasticsearch, packages]

- name: Install Elasticsearch from local .deb package
  apt:
    deb: /tmp/elasticsearch-9.3.2-amd64.deb
    state: present
  tags: [elasticsearch, packages]

- name: Set vm.max_map_count for Elasticsearch
  sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes
  ignore_errors: true
  tags: [elasticsearch, config]

- name: Deploy Elasticsearch configuration
  template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    mode: '0644'
    owner: root
    group: elasticsearch
  notify: Restart Elasticsearch
  tags: [elasticsearch, config]

- name: Configure JVM heap size for Elasticsearch
  copy:
    dest: /etc/elasticsearch/jvm.options.d/custom.options
    content: |
      ## Heap size (from Ansible variables)
      -Xms{{ es_heap_size_min }}
      -Xmx{{ es_heap_size_max }}
    mode: '0644'
    owner: root
    group: elasticsearch
  notify: Restart Elasticsearch
  tags: [elasticsearch, config]

- name: Ensure Elasticsearch data directory exists
  file:
    path: /var/lib/elasticsearch
    state: directory
    mode: '0755'
    owner: elasticsearch
    group: elasticsearch
  tags: [elasticsearch, config]

- name: Ensure Elasticsearch logs directory exists
  file:
    path: /var/log/elasticsearch
    state: directory
    mode: '0755'
    owner: elasticsearch
    group: elasticsearch
  tags: [elasticsearch, config]

- name: Ensure Elasticsearch is started and enabled
  systemd:
    name: elasticsearch
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [elasticsearch, service]

- name: Wait for Elasticsearch HTTP port to be ready
  wait_for:
    port: 9200
    host: 127.0.0.1
    delay: 15
    timeout: 180
  tags: [elasticsearch, service]

- name: Check Elasticsearch cluster health
  uri:
    url: "http://localhost:9200/_cluster/health"
    method: GET
    return_content: yes
    status_code: 200
  register: es_health
  until: es_health.json.status in ["green", "yellow"]
  retries: 20
  delay: 10
  ignore_errors: true
  tags: [elasticsearch, service]
